---
# Test Case: Ready=False, Reason=DeploymentUnavailable
# Scenario: Non-existent image causes ImagePullBackOff
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: error-image-pull-backoff
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: ghcr.io/nonexistent/repository/image:nonexistent-tag-12345
  config:
    port: 8080
