---
# Test Case: Capture Initializing state (best effort)
# Scenario: Try to observe Ready=Unknown, Initializing during initial deployment
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: initializing-state-capture
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
  runtime:
    replicas: 1
