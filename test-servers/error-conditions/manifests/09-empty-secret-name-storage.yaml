---
# Test Case: Accepted=False, Reason=Invalid
# Scenario: Secret name in storage is empty
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: error-empty-secret-name-storage
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    storage:
      - path: /mounted-secret
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: ""  # Empty Secret name should be rejected
