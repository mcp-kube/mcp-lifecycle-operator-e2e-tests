---
# Test Case: Accepted=False, Reason=Invalid
# Scenario: Missing Secret referenced in storage
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: error-missing-secret-storage
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: ghcr.io/modelcontextprotocol/servers/everything:latest
  config:
    port: 8080
    storage:
      - path: /mounted-secret
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: this-secret-does-not-exist
