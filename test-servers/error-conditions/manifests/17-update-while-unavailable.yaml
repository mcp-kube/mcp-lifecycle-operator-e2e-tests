---
# Test Case: Update while deployment unavailable
# Scenario: Apply spec updates while Ready=False, DeploymentUnavailable
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: update-while-unavailable
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: ghcr.io/nonexistent/update-test:unavailable-12345  # Will cause ImagePullBackOff
  config:
    port: 8080
  runtime:
    replicas: 1  # Will be updated during test while deployment is unavailable
