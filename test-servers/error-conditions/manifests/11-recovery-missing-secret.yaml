---
# Test Case: Recovery from missing Secret
# Scenario: Deploy with missing Secret, then create it and verify recovery
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: recovery-missing-secret
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    storage:
      - path: /secret
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: recovery-test-secret  # Will be created after initial deployment
