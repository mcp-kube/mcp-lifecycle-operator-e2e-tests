---
# Test Case: lastTransitionTime stability when only reason changes
# Scenario: Scale to 0 replicas - Ready stays True but reason changes Available → ScaledToZero
# Expected: lastTransitionTime should NOT change (per Kubernetes conventions)
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: lasttransitiontime-reason-change
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
  runtime:
    replicas: 1  # Will be updated to 0 during test (reason changes: Available → ScaledToZero)
