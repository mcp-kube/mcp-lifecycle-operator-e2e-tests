---
# Test Case: Accepted=True, Valid (optional Secret missing)
# Scenario: Deploy with missing but optional Secret - should succeed
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: optional-secret-storage
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    storage:
      - path: /optional-secret
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: optional-secret-that-does-not-exist
            optional: true  # KEY: Missing but optional - should NOT fail validation
