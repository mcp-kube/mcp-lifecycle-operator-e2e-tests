---
# Test Case: Accepted=True, Valid (optional ConfigMap missing)
# Scenario: Deploy with missing but optional ConfigMap - should succeed
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: optional-configmap-storage
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    storage:
      - path: /optional-config
        permissions: ReadOnly
        source:
          type: ConfigMap
          configMap:
            name: optional-config-that-does-not-exist
            optional: true  # KEY: Missing but optional - should NOT fail validation
