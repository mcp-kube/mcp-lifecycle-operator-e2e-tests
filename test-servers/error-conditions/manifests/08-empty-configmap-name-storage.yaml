---
# Test Case: Accepted=False, Reason=Invalid
# Scenario: ConfigMap name in storage is empty
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: error-empty-configmap-name-storage
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    storage:
      - path: /mounted-configmap
        permissions: ReadOnly
        source:
          type: ConfigMap
          configMap:
            name: ""  # Empty ConfigMap name should be rejected
