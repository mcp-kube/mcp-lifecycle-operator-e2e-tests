---
# Test Case: Secret update triggers reconciliation but Deployment does NOT update
# Scenario: Update Secret content, verify reconciliation happens but Deployment unchanged
# Expected: Accepted=True (validation passes), Deployment resourceVersion unchanged
# Why: Pods reference Secrets by name, not content (standard K8s behavior)
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: secret-update-watch
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    storage:
      - path: /config
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: test-update-secret
