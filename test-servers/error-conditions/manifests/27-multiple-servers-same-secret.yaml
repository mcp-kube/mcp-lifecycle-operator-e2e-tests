---
# Test Case: Multiple MCPServers referencing same Secret auto-recover
# Scenario: 3 MCPServers reference same missing Secret, create it once, all recover
# Expected: All 3 MCPServers auto-recover when Secret is created (field indexing test)
# Why: Validates PR #93's field indexing correctly tracks multiple watchers
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: multi-secret-server-1
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/containers/kubernetes_mcp_server:latest
  config:
    port: 8080
    storage:
      - path: /shared
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: shared-secret
