---
# Secret #1: Mounted as volume
apiVersion: v1
kind: Secret
metadata:
  name: secret-for-mounting
  namespace: default
type: Opaque
stringData:
  mounted-secret-file-1.txt: "content-from-mounted-secret-file-1"
  mounted-secret-file-2.txt: "content-from-mounted-secret-file-2"
  mounted-secret-config.json: |
    {
      "key": "value-from-mounted-secret"
    }
---
# Secret #2: Used for env vars
apiVersion: v1
kind: Secret
metadata:
  name: secret-for-env-vars
  namespace: default
type: Opaque
stringData:
  env-var-key-1: "env-var-value-from-secret-1"
  env-var-key-2: "env-var-value-from-secret-2"
---
# ConfigMap #1: Mounted as volume
apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-for-mounting
  namespace: default
data:
  mounted-configmap-file-1.conf: |
    # Config file content
    setting_1 = value-from-mounted-configmap
    setting_2 = another-value-from-mounted-configmap
  mounted-configmap-file-2.yaml: |
    data:
      - item: from-mounted-configmap
---
# ConfigMap #2: Used for env vars
apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-for-env-vars
  namespace: default
data:
  env-var-key-1: "env-var-value-from-configmap-1"
  env-var-key-2: "env-var-value-from-configmap-2"
---
# Secret #3: Used for envFrom (all keys injected as env vars)
apiVersion: v1
kind: Secret
metadata:
  name: secret-for-envfrom
  namespace: default
type: Opaque
stringData:
  envfrom-secret-key-1: "envfrom-secret-value-1"
  envfrom-secret-key-2: "envfrom-secret-value-2"
  envfrom-secret-key-3: "envfrom-secret-value-3"
---
# Secret #4: Used for envFrom with prefix
apiVersion: v1
kind: Secret
metadata:
  name: secret-for-envfrom-prefix
  namespace: default
type: Opaque
stringData:
  prefixed-secret-key-1: "prefixed-secret-value-1"
  prefixed-secret-key-2: "prefixed-secret-value-2"
---
# ConfigMap #3: Used for envFrom (all keys injected as env vars)
apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-for-envfrom
  namespace: default
data:
  envfrom-configmap-key-1: "envfrom-configmap-value-1"
  envfrom-configmap-key-2: "envfrom-configmap-value-2"
  envfrom-configmap-key-3: "envfrom-configmap-value-3"
---
# ConfigMap #4: Used for envFrom with prefix
apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-for-envfrom-prefix
  namespace: default
data:
  prefixed-configmap-key-1: "prefixed-configmap-value-1"
  prefixed-configmap-key-2: "prefixed-configmap-value-2"
---
# ConfigMap #5: Used for writable mount (ReadWrite permission)
apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-for-writable-mount
  namespace: default
data:
  initial-file.txt: "initial-content-in-writable-directory"
  readme.txt: |
    This directory is mounted with ReadWrite permissions.
    The MCP server should be able to create, modify, and delete files here.
---
# Secret #5: Used for selective key projection (items)
apiVersion: v1
kind: Secret
metadata:
  name: secret-for-projection
  namespace: default
type: Opaque
stringData:
  key-to-project-1: "projected-secret-value-1"
  key-to-project-2: "projected-secret-value-2"
  key-not-projected: "this-should-not-appear"
  another-excluded-key: "this-should-also-not-appear"
---
# ConfigMap #6: Used for selective key projection (items)
apiVersion: v1
kind: ConfigMap
metadata:
  name: configmap-for-projection
  namespace: default
data:
  key-to-project-1: "projected-configmap-value-1"
  key-to-project-2: "projected-configmap-value-2"
  key-not-projected: "this-should-not-appear"
  another-excluded-key: "this-should-also-not-appear"
---
# ServiceAccount: Custom service account for testing runtime.security.serviceAccountName
apiVersion: v1
kind: ServiceAccount
metadata:
  name: custom-mcp-service-account
  namespace: default
---
# MCPServer with multiple ConfigMaps and Secrets
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: operator-features
  namespace: default
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: localhost/operator-features-validator:local

  config:
    port: 8080

    # Path: Custom HTTP path for MCP endpoint (tests custom path feature)
    path: /custom/test/path

    # Arguments: Command line arguments passed to the container
    arguments:
      - "--verbose"
      - "--feature-flag"
      - "test-mode"
      - "--config-value=123"
      - "--mcp-path=/custom/test/path"

    # Storage: Mount multiple secrets and configmaps
    storage:
      # Mount Secret #1
      - path: /mounted-secret
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: secret-for-mounting

      # Mount ConfigMap #1
      - path: /mounted-configmap
        permissions: ReadOnly
        source:
          type: ConfigMap
          configMap:
            name: configmap-for-mounting

      # Mount ConfigMap #5 with ReadWrite permissions (writable directory)
      - path: /writable-directory
        permissions: ReadWrite
        source:
          type: ConfigMap
          configMap:
            name: configmap-for-writable-mount

      # Mount Secret #5 with selective key projection (items)
      - path: /projected-secret
        permissions: ReadOnly
        source:
          type: Secret
          secret:
            secretName: secret-for-projection
            items:
              # Project first key to custom path
              - key: key-to-project-1
                path: custom/path/secret-file-1.txt
              # Project second key to custom path
              - key: key-to-project-2
                path: custom/path/secret-file-2.txt
              # Note: key-not-projected and another-excluded-key should NOT appear

      # Mount ConfigMap #6 with selective key projection (items)
      - path: /projected-configmap
        permissions: ReadOnly
        source:
          type: ConfigMap
          configMap:
            name: configmap-for-projection
            items:
              # Project first key to custom path
              - key: key-to-project-1
                path: custom/path/configmap-file-1.conf
              # Project second key to custom path
              - key: key-to-project-2
                path: custom/path/configmap-file-2.conf
              # Note: key-not-projected and another-excluded-key should NOT appear

    # Environment variables from multiple sources
    env:
      # Plain environment variable
      - name: plain_env_var
        value: "plain-env-var-value"

      # From Secret #1 (secret-for-mounting) - demonstrating same secret can be both mounted AND used for env vars
      - name: env_var_from_mounted_secret_key_1
        valueFrom:
          secretKeyRef:
            name: secret-for-mounting
            key: mounted-secret-file-1.txt

      # From Secret #2 (secret-for-env-vars) - only used for env vars, not mounted
      - name: env_var_from_secret_key_1
        valueFrom:
          secretKeyRef:
            name: secret-for-env-vars
            key: env-var-key-1
      - name: env_var_from_secret_key_2
        valueFrom:
          secretKeyRef:
            name: secret-for-env-vars
            key: env-var-key-2

      # From ConfigMap #1 (configmap-for-mounting) - demonstrating same configmap can be both mounted AND used for env vars
      - name: env_var_from_mounted_configmap_key_1
        valueFrom:
          configMapKeyRef:
            name: configmap-for-mounting
            key: mounted-configmap-file-1.conf

      # From ConfigMap #2 (configmap-for-env-vars) - only used for env vars, not mounted
      - name: env_var_from_configmap_key_1
        valueFrom:
          configMapKeyRef:
            name: configmap-for-env-vars
            key: env-var-key-1
      - name: env_var_from_configmap_key_2
        valueFrom:
          configMapKeyRef:
            name: configmap-for-env-vars
            key: env-var-key-2

    # Environment variables from envFrom (bulk injection)
    envFrom:
      # From Secret #3 (secret-for-envfrom) - all keys become env vars without prefix
      - secretRef:
          name: secret-for-envfrom

      # From Secret #4 (secret-for-envfrom-prefix) - all keys become env vars with prefix
      - prefix: "PREFIX_"
        secretRef:
          name: secret-for-envfrom-prefix

      # From ConfigMap #3 (configmap-for-envfrom) - all keys become env vars without prefix
      - configMapRef:
          name: configmap-for-envfrom

      # From ConfigMap #4 (configmap-for-envfrom-prefix) - all keys become env vars with prefix
      - prefix: "PREFIX_"
        configMapRef:
          name: configmap-for-envfrom-prefix

  runtime:
    # Replicas: Number of pod replicas for scaling/HA
    replicas: 2

    # Security context settings
    security:
      # Custom ServiceAccount for RBAC testing
      serviceAccountName: custom-mcp-service-account

      # Pod-level security context
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Container-level security context
      securityContext:
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

    # Resource limits
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
