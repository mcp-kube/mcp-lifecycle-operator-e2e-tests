name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-scripts:
    name: Validate Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check shell scripts are executable
        run: |
          echo "Checking shell scripts..."
          find . -name "*.sh" -type f | while read script; do
            if [ ! -x "$script" ]; then
              echo "❌ Script not executable: $script"
              exit 1
            fi
            echo "✓ $script"
          done

      - name: Shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

          echo "Running shellcheck on scripts..."
          find . -name "*.sh" -type f -print0 | xargs -0 shellcheck -x || true

      - name: Check YAML files
        run: |
          sudo apt-get install -y yamllint

          echo "Validating YAML files..."
          find . -name "*.yaml" -o -name "*.yml" | while read yaml; do
            echo "Checking $yaml"
            yamllint -d relaxed "$yaml" || true
          done

  validate-framework:
    name: Validate Framework
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'framework/package-lock.json'

      - name: Install dependencies
        run: |
          cd framework
          npm ci

      - name: Check TypeScript compilation
        run: |
          cd framework
          npx tsc --noEmit

      - name: Lint TypeScript
        run: |
          cd framework
          # Install eslint if package.json has it configured
          if grep -q '"eslint"' package.json; then
            npm run lint || echo "No lint script configured"
          else
            echo "No ESLint configuration found, skipping"
          fi

  validate-test-servers:
    name: Validate Test Servers
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate test structure
        run: |
          echo "Validating test server structure..."

          for test_dir in test-servers/*/; do
            server_name=$(basename "$test_dir")

            # Skip template
            if [ "$server_name" = "template" ]; then
              continue
            fi

            echo "Checking $server_name..."

            # Check required files
            if [ ! -f "$test_dir/manifest.yaml" ]; then
              echo "❌ Missing manifest.yaml in $server_name"
              exit 1
            fi

            if [ ! -f "$test_dir/test.ts" ]; then
              echo "❌ Missing test.ts in $server_name"
              exit 1
            fi

            if [ ! -x "$test_dir/test.ts" ]; then
              echo "❌ test.ts not executable in $server_name"
              exit 1
            fi

            echo "✓ $server_name structure is valid"
          done

          echo "All test servers validated successfully"
