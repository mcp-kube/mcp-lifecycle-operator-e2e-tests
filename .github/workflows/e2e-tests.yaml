name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering with optional operator ref
    inputs:
      operator_ref:
        description: 'Operator git ref to test (branch, tag, or commit SHA)'
        required: false
        default: 'main'

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify prerequisites
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Docker version: $(docker --version)"
          echo "kubectl version: $(kubectl version --client)"
          echo "kind version: $(kind version)"
          echo "jq version: $(jq --version)"

      - name: Install framework dependencies
        run: |
          cd framework
          npm ci

      - name: Run E2E tests
        id: e2e
        run: |
          ./scripts/run-e2e.sh
        env:
          # Use CI-friendly settings
          NO_COLOR: "1"
          # Use operator ref from manual workflow dispatch input (if provided)
          OPERATOR_REF: ${{ github.event.inputs.operator_ref || 'main' }}

      - name: Upload test logs on failure
        if: failure() && steps.e2e.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs
          path: logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          # Ensure cluster is cleaned up
          kind delete cluster --name kind || true
          # Clean up Docker resources
          docker system prune -af || true

  e2e-tests-operator-ref:
    name: E2E Tests (Operator Branch)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    strategy:
      fail-fast: false
      matrix:
        operator_ref:
          - main
          # Add other branches to test against if needed
          # - v0.1.0
          # - feature/experimental

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Install Kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install framework dependencies
        run: |
          cd framework
          npm ci

      - name: Run E2E tests against ${{ matrix.operator_ref }}
        id: e2e
        run: |
          ./scripts/run-e2e.sh
        env:
          OPERATOR_REF: ${{ matrix.operator_ref }}
          NO_COLOR: "1"

      - name: Upload test logs on failure
        if: failure() && steps.e2e.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-logs-${{ matrix.operator_ref }}
          path: logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          kind delete cluster --name kind || true
          docker system prune -af || true
